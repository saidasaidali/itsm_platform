version: '3.8'

services:
  # ───────────────────────────────────────────────
  # PostgreSQL - Base de données
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: itsm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-itsm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-itsm_password}
      POSTGRES_DB: ${DB_NAME:-itsm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-itsm_user} -d ${DB_NAME:-itsm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itsm_network

  # ───────────────────────────────────────────────
  # Backend - API Express.js
  # ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itsm_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-itsm_user}
      DB_PASSWORD: ${DB_PASSWORD:-itsm_password}
      DB_NAME: ${DB_NAME:-itsm_db}
      JWT_SECRET: ${JWT_SECRET:-changez_ce_secret_en_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      # Ajoutez ici les autres variables de votre backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - itsm_network

  # ───────────────────────────────────────────────
  # Frontend - React + Vite
  # ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itsm_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3001}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - itsm_network
    # Pour le hot-reload en développement
    stdin_open: true
    tty: true

# ───────────────────────────────────────────────
# Volumes persistants
# ───────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ───────────────────────────────────────────────
# Réseau partagé
# ───────────────────────────────────────────────
networks:
  itsm_network:
    driver: bridge
