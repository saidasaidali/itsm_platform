    <noscript>

    <div id="root"></div>
    <script>
      // Charger la config runtime en priorité depuis /config.json (utile pour CDN/static),
      // puis fallback vers l'API backend `/api/settings/public`.
      (function(){
        const urls = ['/config.json', '/api/settings/public'];
        const timeout = 1500;
        let done = false;
        const timer = setTimeout(() => { if (!done) { done = true; window.__ITSM_API_URL = undefined; } }, timeout);
        (async function(){
          for (const u of urls) {
            try {
              const r = await fetch(u, { cache: 'no-store' });
              if (!r.ok) continue;
              const j = await r.json();
              const cfg = j && j.success && j.config ? j.config : j;
              if (cfg && (cfg.apiUrl || cfg.frontendUrl)) {
                window.__ITSM_API_URL = cfg.apiUrl;
                window.__ITSM_FRONTEND_URL = cfg.frontendUrl;
                break;
              }
            } catch (e) { /* ignore and try next */ }
          }
        })().finally(() => { clearTimeout(timer); done = true; });
      })();
    </script>
